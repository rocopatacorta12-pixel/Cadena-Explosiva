name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Instalar dependencias
        run: npm install

      - name: Agregar plataforma Android
        run: npx cap add android

      - name: Generar íconos de la app (clásico morado)
        run: npx @capacitor/assets@3 generate --android --iconBackgroundColor '#26215C' --iconBackgroundColorDark '#26215C'

      - name: Sincronizar web → Android
        run: npx cap sync android

      - name: Agregar permiso de vibración (necesario para que vibre el celu)
        run: |
          M=android/app/src/main/AndroidManifest.xml
          grep -q 'android.permission.VIBRATE' $M || sed -i 's|<application|<uses-permission android:name="android.permission.VIBRATE" />\n    <application|' $M

      - name: Compilar APK (debug)
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: cadena-explosiva-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
